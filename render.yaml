services:
  - type: web
    name: jetso-showcase-bot
    env: python
    buildCommand: "pip install -r server/requirements.txt"
    startCommand: "python server/app.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
