<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="jetso_showcase">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>jetso_showcase</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Floating Telegram Bot Button -->
  <style>
    .telegram-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #2AABEE;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(42, 171, 238, 0.4);
      z-index: 9999;
      display: flex;
      align-items: center;
      transition: transform 0.2s, background-color 0.2s;
    }
    .telegram-float:hover {
      transform: translateY(-2px);
      background-color: #229ED9;
    }
    .telegram-icon {
      margin-right: 8px;
      font-size: 18px;
    }
  </style>
  <a href="https://t.me/IssacTaiJetsoBot" target="_blank" class="telegram-float">
    <span class="telegram-icon">🤖</span> Ask AI Bot
  </a>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
